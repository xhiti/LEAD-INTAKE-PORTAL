# ============================================================================
# CI Pipeline — Lead Intake Portal
# ============================================================================
# Runs on every push and pull request to ensure code quality before merging.
# Steps: Install → Lint → Type-check → Build
# ============================================================================

name: CI — Lint, Type-check & Build

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Quality Gate
  # ────────────────────────────────────────────────────────────────────
  # (omitted)
  
  # ────────────────────────────────────────────────────────────────────
  # Quality Gate
  # ────────────────────────────────────────────────────────────────────
  quality:
    name: 🧪 Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: 📥 Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: 🔎 ESLint — Lint check
        run: npm run lint

      - name: 🏷️ TypeScript — Type check
        run: npm run type-check

  # ────────────────────────────────────────────────────────────────────
  # Build Verification
  # ────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    env:
      # ── Dummy env vars required by Next.js build (not used at runtime) ──
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
      GEMINI_API_KEY: "placeholder"
      GROQ_API_KEY: "placeholder"
      GLM_API_KEY: "placeholder"
      RESEND_API_KEY: "placeholder"
      RESEND_FROM_EMAIL: "no-reply@example.com"
      RESEND_FROM_NAME: "CI Build"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "BML0u6vH4_xP8e-28qP8f_e-28qP8f_e-28qP8f_e-28qP8f_e-28qP8f_e-28qP8f_e-28qP8f_e-28qP8f_e-28qP8f_e-28q"
      VAPID_PRIVATE_KEY: "placeholder-vapid-private"
      VAPID_EMAIL: "mailto:ci@example.com"

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: 📥 Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: 🔨 Next.js — Production build
        run: npm run build

      - name: 📊 Report build artifact size
        run: |
          echo "## 📦 Build Output Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| .next size | $(du -sh .next | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| node_modules size | $(du -sh node_modules | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────
  # PR Status Comment (only on pull requests)
  # ────────────────────────────────────────────────────────────────────
  status:
    name: 📋 PR Status
    runs-on: ubuntu-latest
    needs: [quality, build]
    if: github.event_name == 'pull_request'

    steps:
      - name: ✅ All checks passed
        run: |
          echo "## ✅ CI Pipeline Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Next.js Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Ready for review and merge!" >> $GITHUB_STEP_SUMMARY
