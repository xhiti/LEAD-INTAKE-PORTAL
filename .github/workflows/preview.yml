# ============================================================================
# Preview Deployment — Lead Intake Portal
# ============================================================================
# Deploys a unique preview environment to Vercel on every pull request.
# Each PR gets its own URL for testing before merging to main.
# ============================================================================

name: Preview — Deploy to Vercel

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Deploy Preview to Vercel
  # ────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🔨 Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel (Preview)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "## 🔮 Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Preview URL | [$DEPLOY_URL]($DEPLOY_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.head_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview-url }}';
            const body = `## 🔮 Preview Deployment Ready!

            | Detail | Value |
            |--------|-------|
            | **Preview URL** | [${previewUrl}](${previewUrl}) |
            | **Branch** | \`${{ github.head_ref }}\` |
            | **Commit** | \`${context.sha.substring(0, 7)}\` |

            ### ✅ Verification Checklist
            - [ ] Login flow works (email + Google)
            - [ ] Submission form submits correctly
            - [ ] AI categorization returns results
            - [ ] Dashboard loads with data
            - [ ] i18n switching works
            - [ ] Dark/light mode toggles correctly
            - [ ] Role-based navigation shows correct items

            > 🤖 *Deployed automatically by GitHub Actions*`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('🔮 Preview Deployment Ready!')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
